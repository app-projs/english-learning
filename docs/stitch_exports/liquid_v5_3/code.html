<style>
        .liquid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #f8f9fe 0%, #e6deff 50%, #f8f9fe 100%);
            overflow: hidden;
        }
        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: linear-gradient(180deg, rgba(124, 92, 255, 0.2) 0%, rgba(124, 92, 255, 0.05) 100%);
            filter: blur(80px);
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }
        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);

<script>
    let isRecording = false;
    function toggleRecording() {
        const btn = document.getElementById('mic-btn');
        const bg = document.getElementById('recording-bg');
        isRecording = !isRecording;
        
        if (isRecording) {
            btn.classList.add('animate-pulse');
            bg.classList.remove('opacity-0');
            bg.classList.add('opacity-100', 'animate-ping');
            btn.querySelector('span').textContent = 'graphic_eq';
        } else {
            btn.classList.remove('animate-pulse');
            bg.classList.add('opacity-0');
            bg.classList.remove('opacity-100', 'animate-ping');
            btn.querySelector('span').textContent = 'mic';
        }
    }
</script>
