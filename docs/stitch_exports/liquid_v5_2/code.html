<style>
    body {
      background-color: #f8f9fe;
      position: relative;
    }
    .liquid-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }
    .liquid-blob {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(94, 57, 224, 0.15) 0%, rgba(94, 57, 224, 0) 70%);
      filter: blur(60px);
      border-radius: 50%;
      animation: float 20s infinite alternate;
    }
    .liquid-blob:nth-child(2) {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(254, 156, 65, 0.1) 0%, rgba(254, 156, 65, 0) 70%);
      right: -100px;
      top: 10%;
      animation-delay: -5s;
    }
    .liquid-blob:nth-child(3) {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(0, 100, 124, 0.1) 0%, rgba(0, 100, 124, 0) 70%);
      left: 10%;
      bottom: 10%;
      animation-delay: -10s;
    }
    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(100px, 50px) scale(1.1); }
    }
    .branch-line {
      stroke: #c9c4d8;
      stroke-width: 2;
      stroke-dasharray: 4 4;
