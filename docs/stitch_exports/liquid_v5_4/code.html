<script>
        // Play/Pause Interaction
        const playBtn = document.getElementById('mainPlayBtn');
        let isPlaying = false;
        playBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            playBtn.querySelector('span').textContent = isPlaying ? 'pause' : 'play_arrow';
            playBtn.querySelector('span').classList.toggle('translate-x-0.5', !isPlaying);
            
            document.querySelectorAll('.wave-bar').forEach(bar => {
                if(isPlaying) {
                    bar.style.animation = 'wave 1s infinite ease-in-out';
                } else {
                    bar.style.animation = 'none';
                }
            });
        });

        // Add dynamic wave animation keyframe via JS if not in CSS
        const style = document.createElement('style');
        style.textContent = `
            @keyframes wave {
                0%, 100% { transform: scaleY(1); }
                50% { transform: scaleY(1.5); }
            }
        `;
        document.head.appendChild(style);

        // Speed selector functionality
        const speedButtons = document.querySelectorAll('.speed-btn');
        speedButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                speedButtons.forEach(b => {
                    b.classList.remove('bg-primary', 'text-white', 'shadow-md');
                    b.classList.add('text-on-surface-variant');
                });
                btn.classList.add('bg-primary', 'text-white', 'shadow-md');
                btn.classList.remove('text-on-surface-variant');
            });
        });
    </script>
