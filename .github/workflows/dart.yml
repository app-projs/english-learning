name: Flutter CI/CD

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  # 任务 1：代码静态检查与测试（确保代码质量）
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true # 开启缓存，加速后续构建

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: flutter analyze

      # 如果你目前还没有写测试用例，可以把下面这两行删掉或注释掉
      - name: Run tests
        run: flutter test

  # 任务 2：自动编译 Android APK（只有当 verify 任务成功后才会执行）
  build-android:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Flutter 编译 Android 必须依赖 Java 环境

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # 关键步骤：执行编译安卓无签名 Release APK
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      # 将编译出来的 APK 发送到 GitHub Actions 的 Artifacts 中供你下载
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: english-learning-apk
          path: build/app/outputs/flutter-apk/app-release.apk
